# .github/workflows/build-and-deploy.yml

name: Build and Deploy GitHub Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Combine spec files into a single Markdown file
        run: |
          # The shell glob (*) expands in alphanumeric order, so the numbered
          # files will be concatenated in the correct sequence.
          cat spec/*.md > combined_spec.md

      - name: Render PlantUML diagrams to SVG
        uses: plantuml/plantuml-action@v2
        with:
          # Find all .puml files in the diagrams directory
          files: "diagrams/*.puml"
          # Output the rendered SVG files to an 'assets' directory
          output: "assets"
          
      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Create CSS file for styling
        run: |
          mkdir -p assets
          cat <<'EOF' > assets/style.css
          body {
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
              line-height: 1.6;
              color: #333;
              max-width: 800px;
              margin: 0 auto;
              padding: 20px;
          }
          h1, h2, h3, h4, h5, h6 {
              font-weight: 600;
              border-bottom: 1px solid #eaecef;
              padding-bottom: .3em;
          }
          code {
              font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
              background-color: #f6f8fa;
              padding: .2em .4em;
              margin: 0;
              font-size: 85%;
              border-radius: 3px;
          }
          pre {
              background-color: #f6f8fa;
              padding: 16px;
              overflow: auto;
              border-radius: 3px;
          }
          pre code {
              padding: 0;
              margin: 0;
              font-size: 100%;
              background-color: transparent;
              border-radius: 0;
          }
          table {
              border-collapse: collapse;
              width: 100%;
          }
          th, td {
              border: 1px solid #ddd;
              padding: 8px;
              text-align: left;
          }
          th {
              background-color: #f2f2f2;
          }
          img {
              max-width: 100%;
              height: auto;
          }
          EOF

      - name: Convert combined Markdown to HTML using Pandoc
        run: |
          pandoc combined_spec.md \
            --standalone \
            --toc \
            --css=assets/style.css \
            --metadata title="ACE-NET Framework Specification" \
            -o index.html

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire directory which now contains index.html and the assets folder
          path: .

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
